name: Update episode data

on:
  schedule:
    - cron: '0 3 * * 4'  # Wednesday 3am UTC, after episode drops
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Export data
        run: python export_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/comics.json data/episodes.json
          git diff --staged --quiet || git commit -m "chore: update episode data [skip ci]"
          git push
