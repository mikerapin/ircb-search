<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' https://image.simplecastcdn.com https://images.squarespace-cdn.com; frame-src https://player.simplecast.com; connect-src 'self' https://raw.githubusercontent.com https://github.com;">
    <title>I Read Comic Books — Episode Search</title>
    <meta name="description" id="meta-description" content="Search 500+ episodes of I Read Comic Books to find every time a comic or topic was discussed.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="preload" href="data/comics.json" as="fetch" crossorigin>
    <link rel="preload" href="data/episodes.json" as="fetch" crossorigin>
    <script src="vendor/fuse.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:           #120d08;
            --bg-card:      #1c1510;
            --bg-card-hover:#261d14;
            --border:       rgba(255, 220, 180, 0.10);
            --border-hover: rgba(255, 220, 180, 0.22);
            --red:          #e63946;
            --red-dim:      rgba(230,57,70,0.15);
            --red-border:   rgba(230,57,70,0.35);
            --orange:       #e8611a;
            --orange-dim:   rgba(232,97,26,0.15);
            --orange-border:rgba(232,97,26,0.35);
            --yellow:       #f5c518;
            --yellow-dim:   rgba(245,197,24,0.12);
            --yellow-border:rgba(245,197,24,0.3);
            --blue:         #5eb8ff;
            --blue-dim:     rgba(76,201,240,0.1);
            --blue-border:  rgba(76,201,240,0.25);
            --text:         #f0f0f8;
            --text-muted:   #a09080;
            --text-dim:     #8a7060;
        }

        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            line-height: 1.6;
        }

        /* ── Header / Hero ───────────────────────────────── */
        header {
            padding: 3rem 1.5rem 2.5rem;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(230,57,70,0.08) 0%, rgba(245,197,24,0.03) 60%, transparent 100%);
        }

        .header-inner {
            max-width: 680px;
            margin: 0 auto;
        }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.25rem;
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            width: 100%;
            text-align: left;
        }

        .logo-art {
            width: 52px;
            height: 52px;
            border-radius: 10px;
            object-fit: cover;
            flex-shrink: 0;
            border: 1px solid var(--border-hover);
        }

        h1 {
            font-family: 'Bangers', cursive;
            font-size: clamp(2.1rem, 5.5vw, 3.2rem);
            letter-spacing: 0.05em;
            line-height: 1;
            color: var(--text);
        }

        h1 em {
            font-style: normal;
            color: var(--red);
        }

        .tagline {
            color: var(--text-dim);
            font-size: 0.88rem;
            margin-top: 0.6rem;
            margin-bottom: 1.75rem;
        }

        /* ── Search input ────────────────────────────────── */
        .search-box {
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            pointer-events: none;
        }

        #search-input {
            width: 100%;
            padding: 0.9rem 2.5rem 0.9rem 3rem;
            background: var(--bg-card);
            border: 1px solid var(--border-hover);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 1.05rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            -webkit-appearance: none;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.4);
        }

        #search-input:focus {
            border-color: var(--red);
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.4), 0 0 0 3px var(--red-dim);
        }

        #search-input::placeholder { color: var(--text-dim); }

        /* hide browser clear button */
        #search-input::-webkit-search-cancel-button { display: none; }

        /* ── Mode tabs ───────────────────────────────────── */
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.875rem;
        }

        .tab {
            padding: 0.35rem 1rem;
            border-radius: 20px;
            border: 1px solid var(--border-hover);
            background: transparent;
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .tab:hover { border-color: var(--red); color: var(--text); }

        .tab.active {
            background: var(--red);
            border-color: var(--red);
            color: #fff;
        }

        /* ── Sort row ────────────────────────────────────── */
        .sort-row {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            margin-top: 0.5rem;
        }

        .sort-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            white-space: nowrap;
        }

        .sort-btn {
            padding: 0.25rem 0.7rem;
            border-radius: 20px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-dim);
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .sort-btn:hover { color: var(--text); }

        .sort-btn.active {
            border-color: var(--border-hover);
            color: var(--text);
            background: rgba(255,255,255,0.05);
        }

        /* ── Main content ────────────────────────────────── */
        main {
            max-width: 680px;
            margin: 0 auto;
            padding: 2rem 1.5rem 5rem;
        }

        /* ── Section divider ─────────────────────────────── */
        .section-label {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 2rem 0 0.875rem;
            font-family: 'Bangers', cursive;
            font-size: 1.1rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .result-count {
            font-family: 'Inter', sans-serif;
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0;
            text-transform: none;
            color: var(--text-dim);
        }

        /* ── Cards ───────────────────────────────────────── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-left: 2px solid transparent;
            border-radius: 12px;
            padding: 1.1rem 1.25rem;
            margin-bottom: 0.6rem;
            transition: border-color 0.15s, background 0.15s, border-left-color 0.15s;
        }

        .card:hover {
            border-color: var(--border-hover);
            background: var(--bg-card-hover);
            border-left-color: var(--red);
        }

        /* top row: title + date */
        .card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
        }

        .comic-name {
            font-family: 'Bangers', cursive;
            font-size: 1.25rem;
            letter-spacing: 0.04em;
            color: var(--yellow);
            line-height: 1.2;
        }

        .episode-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
            line-height: 1.35;
            margin-top: 0.2rem;
        }

        .card-date {
            font-size: 0.76rem;
            color: var(--text-dim);
            white-space: nowrap;
            flex-shrink: 0;
            padding-top: 0.1rem;
        }

        /* meta row: people + segment pill */
        .card-meta {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .meta-people {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .pill {
            display: inline-flex;
            align-items: center;
            padding: 0.15rem 0.55rem;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 500;
        }

        .pill-red    { background: var(--red-dim);    border: 1px solid var(--red-border);    color: var(--red);    }
        .pill-orange { background: var(--orange-dim); border: 1px solid var(--orange-border); color: var(--orange); }


        /* keyword tags */
        .keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            margin-top: 0.55rem;
        }

        .kw {
            font-size: 0.71rem;
            color: var(--text-dim);
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            padding: 0.12rem 0.45rem;
            border-radius: 4px;
        }

        .kw.match {
            color: var(--blue);
            background: var(--blue-dim);
            border-color: var(--blue-border);
        }

        /* action links */
        .card-action {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            margin-top: 0.75rem;
            font-size: 0.8rem;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.15s;
        }

        .card-action.timestamp {
            color: var(--red);
        }
        .card-action.timestamp:hover { color: #ff6b77; }

        .card-action.listen {
            color: var(--blue);
        }
        .card-action.listen:hover { color: #7de0ff; }

        .ts-badge {
            font-family: 'Inter', monospace;
            font-size: 0.78rem;
            background: var(--red-dim);
            border: 1px solid var(--red-border);
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            letter-spacing: 0.02em;
        }

        /* ── Empty / status states ───────────────────────── */
        .state-box {
            text-align: center;
            padding: 4rem 1rem;
        }

        .state-box .icon { font-size: 2.75rem; margin-bottom: 0.875rem; }

        .state-box h2 {
            font-family: 'Bangers', cursive;
            font-size: 1.75rem;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .state-box p {
            color: var(--text-muted);
            font-size: 0.88rem;
            max-width: 340px;
            margin: 0 auto;
        }

        .state-box.loading .icon { animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .state-box.error h2 { color: var(--red); }

        .state-box code {
            display: inline-block;
            margin-top: 0.75rem;
            background: var(--bg-card);
            border: 1px solid var(--border-hover);
            border-radius: 6px;
            padding: 0.3rem 0.7rem;
            font-size: 0.82rem;
            color: var(--yellow);
            font-family: monospace;
        }

        /* ── Footer ──────────────────────────────────────── */
        footer {
            text-align: center;
            padding: 1.5rem;
            border-top: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 0.78rem;
        }

        footer a { color: var(--text-muted); text-decoration: none; }
        footer a:hover { color: var(--red); }

        /* ── Clear button ───────────────────────────────── */
        .clear-btn {
            position: absolute;
            right: 0.9rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 1rem;
            padding: 0.2rem 0.3rem;
            line-height: 1;
            transition: color 0.15s;
        }
        .clear-btn:hover { color: var(--text); }

        /* ── Panelist filter ─────────────────────────────── */
        .panelist-row {
            display: flex;
            align-items: flex-start;
            gap: 0.4rem;
            margin-top: 0.5rem;
        }

        .panelist-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
        }

        .panelist-chip {
            padding: 0.25rem 0.65rem;
            border-radius: 20px;
            border: 1px solid var(--border-hover);
            background: transparent;
            color: var(--text-dim);
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .panelist-chip:hover { color: var(--text); border-color: var(--yellow-border); }

        .panelist-chip.active {
            background: var(--yellow-dim);
            border-color: var(--yellow-border);
            color: var(--yellow);
        }

        .guest-chip { border-color: var(--orange-border); }
        .guest-chip:hover { color: var(--orange); border-color: var(--orange-border); }
        .guest-chip.active { background: var(--orange-dim); border-color: var(--orange-border); color: var(--orange); }

        /* ── Embed player ────────────────────────────────── */
        .card-ext-link {
            font-size: 0.72rem;
            color: var(--text-dim);
            text-decoration: none;
            margin-left: 0.5rem;
            vertical-align: middle;
            transition: color 0.15s;
        }
        .card-ext-link:hover { color: var(--blue); }

        .play-btn {
            background: none;
            border: none;
            padding: 0;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--blue);
            cursor: pointer;
        }

        /* ── Trending comics ─────────────────────────────── */
        .trending-header {
            font-family: 'Bangers', cursive;
            font-size: 1.15rem;
            color: var(--text);
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        .trending-header::before {
            content: '';
            display: inline-block;
            width: 20px;
            height: 2px;
            background: var(--red);
            margin-right: 0.5rem;
            vertical-align: middle;
        }

        .trending-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .empty-state-wrap {
            padding-top: 2rem;
            min-height: 55vh;
        }

        .new-this-week-ep {
            font-size: 0.78rem;
            color: var(--text-dim);
            margin-bottom: 0.75rem;
            font-style: italic;
        }

        .panelist-hero  { font-family: 'Bangers', cursive; font-size: 2rem; letter-spacing: 0.06em; margin-bottom: 0.25rem; }
        .panelist-stats { font-size: 0.82rem; color: var(--text-dim); margin-bottom: 1.5rem; }
        .back-link      { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.82rem; color: var(--text-dim); text-decoration: none; margin-bottom: 1.5rem; cursor: pointer; background: none; border: none; padding: 0; font-family: 'Inter', sans-serif; }
        .back-link:hover { color: var(--text); }

        .panelist-photo {
            width: 80px; height: 80px;
            border-radius: 50%;
            object-fit: contain;
            background: var(--bg-card-hover);
            border: 2px solid var(--border-hover);
            display: block;
            margin-bottom: 0.75rem;
        }

        /* ── Panelist nav dropdown ───────────────────────── */
        .panelist-nav { position: relative; margin-bottom: 1.25rem; }

        .panelist-nav-btn {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.35rem 0.875rem;
            background: transparent;
            border: 1px solid var(--border-hover);
            border-radius: 20px;
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s;
        }
        .panelist-nav-btn:hover, .panelist-nav-btn[aria-expanded="true"] {
            border-color: var(--red);
            color: var(--text);
        }

        .panelist-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 0.5rem);
            left: 0;
            background: var(--bg-card);
            border: 1px solid var(--border-hover);
            border-radius: 12px;
            padding: 1rem;
            z-index: 200;
            width: 360px;
            max-width: calc(100vw - 3rem);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .panelist-dropdown.open { display: block; }

        .panelist-dropdown-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
        }

        .panelist-dropdown-item {
            display: flex; flex-direction: column; align-items: center;
            gap: 0.3rem;
            padding: 0.5rem 0.25rem;
            border-radius: 8px;
            text-decoration: none;
            color: var(--text);
            cursor: pointer;
            border: none;
            background: none;
            font-family: 'Inter', sans-serif;
            transition: background 0.15s;
        }
        .panelist-dropdown-item:hover { background: var(--bg-card-hover); }

        .panelist-avatar {
            width: 52px; height: 52px;
            border-radius: 50%;
            object-fit: contain;
            background: var(--bg-card-hover);
            border: 1px solid var(--border);
        }

        .panelist-avatar-name {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.2;
        }

        .trending-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.75rem;
            background: var(--bg-card);
            border: 1px solid var(--border-hover);
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.15s, background 0.15s;
        }

        .trending-chip:hover {
            border-color: var(--yellow-border);
            background: var(--yellow-dim);
        }

        .trending-chip:hover .tc-count {
            color: var(--yellow);
        }

        .tc-name {
            font-size: 0.85rem;
            color: var(--text);
            font-weight: 600;
        }

        .tc-count {
            font-size: 0.72rem;
            color: var(--red);
            opacity: 0.85;
            transition: color 0.15s;
        }

        /* ── Responsive ──────────────────────────────────── */
        @media (max-width: 480px) {
            header { padding: 2rem 1rem 1.75rem; }
            main { padding: 1.5rem 1rem 4rem; }
            .tabs { flex-wrap: wrap; }
        }

        .sr-only {
            position: absolute;
            width: 1px; height: 1px;
            padding: 0; margin: -1px;
            overflow: hidden;
            clip: rect(0,0,0,0);
            white-space: nowrap;
            border: 0;
        }

        @media (prefers-reduced-motion: reduce) {
            html { scroll-behavior: auto; }
            .state-box.loading .icon { animation: none; }
        }

        @media (pointer: coarse) {
            .panelist-chip, .trending-chip, .tab, .sort-btn { min-height: 44px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <button class="logo-row" aria-label="Clear search and return home">
            <img class="logo-art"
                 src="https://image.simplecastcdn.com/images/a038770a-a3bd-4472-9c81-71d8fde87cb9/a69b3e53-c1d6-4a76-8c13-0eae79ce46fa/3000x3000/podcast-cover-rgb-final-30001.png"
                 alt="IRCB"
                 onerror="this.style.display='none'">
            <h1>I Read <em>Comic Books</em></h1>
        </button>
        <p class="tagline" id="tagline">Search every comic and topic discussed across 500+ episodes.</p>

        <div class="panelist-nav" id="panelist-nav">
            <button class="panelist-nav-btn" id="panelist-nav-btn"
                    aria-haspopup="true" aria-expanded="false"
                    aria-controls="panelist-dropdown"
                    onclick="togglePanelistMenu()">
                Meet the Panelists ▾
            </button>
            <div class="panelist-dropdown" id="panelist-dropdown" role="menu">
                <div class="panelist-dropdown-grid" id="panelist-dropdown-grid"></div>
            </div>
        </div>

        <label for="search-input" class="sr-only">Search episodes and comics</label>
        <div class="search-box">
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="17" height="17"
                 viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                 stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="search" id="search-input"
                   placeholder="Spider-Man, Saga, X-Men, horror, creator-owned…"
                   autocomplete="off" spellcheck="false">
            <button id="clear-btn" class="clear-btn" style="display:none" aria-label="Clear search">✕</button>
        </div>

        <div class="tabs" role="tablist" aria-label="Search mode">
            <button class="tab active" data-mode="all" role="tab" aria-selected="true">All</button>
            <button class="tab" data-mode="comics" role="tab" aria-selected="false">Comics Only</button>
            <button class="tab" data-mode="topics" role="tab" aria-selected="false">Topics Only</button>
        </div>

        <div class="sort-row" id="sort-row" style="display:none">
            <span class="sort-label">Sort:</span>
            <button class="sort-btn active" data-sort="relevance" aria-pressed="true">Relevance</button>
            <button class="sort-btn" data-sort="recent" aria-pressed="false">Most Recent</button>
        </div>
    </div>
</header>

<main>
    <div id="results" aria-live="polite" aria-busy="false"></div>
</main>

<footer>
    Data from <a href="https://github.com/sshugars/ircb" target="_blank" rel="noopener noreferrer">sshugars/ircb</a>
    &nbsp;·&nbsp;
    Listen at <a href="https://ircbpodcast.simplecast.com" target="_blank" rel="noopener noreferrer">ircbpodcast.simplecast.com</a>
    &nbsp;·&nbsp;
    <a href="https://patreon.com/ircbpodcast" target="_blank" rel="noopener noreferrer">Patreon</a>
</footer>

<script>
// ─── Canonical panelist roster ────────────────────────────────────────────────
const PANELISTS = [
    { name: "Mike Rapin",       display: "Mike Rapin",       photo: "https://images.squarespace-cdn.com/content/v1/64bab1448cbc203e853efeed/fdeaa485-7fc3-465f-aaea-629a5711facf/mike.png" },

    { name: "Daniel Martinez",  display: "Daniel Martinez",  aliases: ["Danny Martinez"], photo: "https://images.squarespace-cdn.com/content/v1/64bab1448cbc203e853efeed/4cd0101a-59fb-47d8-af40-2ecc960687a9/danny_icon_transparent_edit.png" },
    { name: "Kait Lamphere",    display: "Kait Lamphere",    photo: "https://images.squarespace-cdn.com/content/v1/64bab1448cbc203e853efeed/bdf64a36-d529-48b3-908c-9ec19b6c96e2/kait_transparent.png" },

    { name: "Kate Skocelas",    display: "Kate Skocelas",    photo: "https://images.squarespace-cdn.com/content/v1/64bab1448cbc203e853efeed/6b6e747b-6467-4f78-96ea-2450f310c5d1/kate_transparent.png" },

    { name: "Paul Jaissle",     display: "Paul Jaissle",     photo: "https://images.squarespace-cdn.com/content/v1/64bab1448cbc203e853efeed/2eb2279f-e64e-42c1-939f-824b11d51b07/paul_transparent.png" },

    { name: "Zander",           display: "Zander Riggs",     photo: "https://images.squarespace-cdn.com/content/v1/64bab1448cbc203e853efeed/33a0d63b-8fa2-48b8-851c-b34766369026/zander_revision_transparent.png" },
];
const PANELIST_MAP = Object.fromEntries(PANELISTS.map(p => [p.name, p]));

// ─── State ────────────────────────────────────────────────────────────────────
let comics   = [];
let episodes = [];
let epMap    = {};   // show_id → episode
let fuseComics   = null;
let fuseEpisodes = null;
let topComics       = [];
let topRecentComics = [];
let panelists    = [];
let mode      = "all";
let sort      = "relevance";
let query     = "";
let panelist  = null;
let guestOnly = false;
let openEmbed = null;
let searchDebounceTimer = null;
let latestEpisodeComics = [];
let latestEpisodeInfo   = null;
let panelistView = null;

// ─── Boot ─────────────────────────────────────────────────────────────────────
async function init() {
    document.getElementById("results").setAttribute("aria-busy", "true");
    setResults(loadingState());
    try {
        const [cr, er] = await Promise.all([
            fetch("data/comics.json"),
            fetch("data/episodes.json")
        ]);
        if (!cr.ok || !er.ok) throw new Error("not-found");
        [comics, episodes] = await Promise.all([cr.json(), er.json()]);

        episodes.forEach(ep => { epMap[ep.show_id] = ep; });

        const epCount = episodes.length;
        document.getElementById("tagline").textContent =
            `Search every comic and topic discussed across ${epCount}+ episodes.`;
        document.getElementById("meta-description").setAttribute("content",
            `Search ${epCount}+ episodes of I Read Comic Books to find every time a comic or topic was discussed.`);

        const comicEpisodes = {};
        comics.forEach(m => {
            if (m.comic) {
                if (!comicEpisodes[m.comic]) comicEpisodes[m.comic] = new Set();
                comicEpisodes[m.comic].add(m.show_id);
            }
        });
        const comicCounts = {};
        Object.entries(comicEpisodes).forEach(([comic, ids]) => {
            comicCounts[comic] = ids.size;
        });
        topComics = Object.entries(comicCounts)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 10)
            .map(([name, count]) => ({ name, count }));

        const twelveMonthsAgo = new Date();
        twelveMonthsAgo.setFullYear(twelveMonthsAgo.getFullYear() - 1);
        const recentEps = {};
        comics.forEach(m => {
            if (!m.comic) return;
            const ep = epMap[m.show_id];
            if (ep && ep.date && new Date(ep.date) >= twelveMonthsAgo) {
                if (!recentEps[m.comic]) recentEps[m.comic] = new Set();
                recentEps[m.comic].add(m.show_id);
            }
        });
        topRecentComics = Object.entries(recentEps)
            .map(([name, ids]) => ({ name, count: ids.size }))
            .sort((a, b) => b.count - a.count)
            .slice(0, 10);

        // Find most recent episode with comic mentions
        const sortedEps = [...episodes].sort((a, b) => new Date(b.date) - new Date(a.date));
        const comicsByEp = {};
        comics.forEach(m => { if (m.comic) (comicsByEp[m.show_id] ||= new Set()).add(m.comic); });
        for (const ep of sortedEps) {
            const set = comicsByEp[ep.show_id];
            if (set && set.size) { latestEpisodeComics = [...set]; latestEpisodeInfo = ep; break; }
        }

        const episodeNames = new Set();
        episodes.forEach(ep => {
            if (ep.people) ep.people.split(",").map(s => s.trim()).filter(Boolean).forEach(n => episodeNames.add(n));
        });
        panelists = PANELISTS.filter(p => episodeNames.has(p.name)).map(p => p.name);

        // Populate the panelist dropdown menu
        const grid = document.getElementById("panelist-dropdown-grid");
        if (grid) {
            grid.innerHTML = PANELISTS.map(p =>
                `<button class="panelist-dropdown-item" role="menuitem"
                    onclick="closePanelistMenu(); location.href='?view=panelist&name=${esc(encodeURIComponent(p.name))}'">
                    <img class="panelist-avatar" src="${esc(p.photo)}" alt="${esc(p.display)}" loading="lazy">
                    <span class="panelist-avatar-name">${esc(p.display.split(" ")[0])}</span>
                </button>`
            ).join("");
        }

        fuseComics = new Fuse(comics, {
            keys: ["comic"],
            threshold: 0.3,
            minMatchCharLength: 2,
            includeScore: true
        });

        fuseEpisodes = new Fuse(episodes, {
            keys: ["keywords", "title"],
            threshold: 0.3,
            minMatchCharLength: 2,
            includeScore: true
        });

        // Recompute chip counts using fuzzy search so they match what clicking the chip shows
        const computeChipCount = name => {
            const ids = new Set();
            fuseComics.search(name).forEach(r => ids.add(r.item.show_id));
            fuseEpisodes.search(name).forEach(r => ids.add(r.item.show_id));
            return ids.size || 1;
        };
        topComics       = topComics.map(c => ({ ...c, count: computeChipCount(c.name) })).sort((a, b) => b.count - a.count);
        topRecentComics = topRecentComics.map(c => ({ ...c, count: computeChipCount(c.name) })).sort((a, b) => b.count - a.count);

        // Restore search state from URL
        const params = new URLSearchParams(location.search);
        const urlMode = params.get("mode");
        const urlSort = params.get("sort");
        const urlQ    = params.get("q");
        if (urlMode && ["all","comics","topics"].includes(urlMode)) {
            mode = urlMode;
            document.querySelectorAll(".tab").forEach(b => {
                const active = b.dataset.mode === urlMode;
                b.classList.toggle("active", active);
                b.setAttribute("aria-selected", String(active));
            });
        }
        if (urlSort && ["relevance","recent"].includes(urlSort)) {
            sort = urlSort;
            document.querySelectorAll(".sort-btn").forEach(b => {
                const active = b.dataset.sort === urlSort;
                b.classList.toggle("active", active);
                b.setAttribute("aria-pressed", String(active));
            });
        }
        const urlPanelist = params.get("panelist");
        if (urlPanelist) panelist = urlPanelist;
        if (params.get("guest") === "1") guestOnly = true;
        if (urlQ) {
            query = urlQ;
            document.getElementById("search-input").value = urlQ;
            document.getElementById("clear-btn").style.display = "block";
        }
        const urlView = params.get("view");
        const urlName = params.get("name");
        if (urlView === "panelist" && urlName) {
            panelistView = urlName;
        }
        document.getElementById("results").setAttribute("aria-busy", "false");
        if (panelistView) {
            renderPanelistPage(panelistView);
            return;
        }
        runSearch();
    } catch (e) {
        document.getElementById("results").setAttribute("aria-busy", "false");
        setResults(errorState(e.message === "not-found"));
    }
}

// ─── Search ───────────────────────────────────────────────────────────────────
function runSearch() {
    if (!fuseComics) return;
    if (!query.trim()) { setResults(emptyState()); return; }

    let comicHits   = [];
    let episodeHits = [];

    if (mode !== "topics") {
        comicHits = fuseComics.search(query, { limit: 100 }).map(r => r.item);
    }

    if (mode !== "comics") {
        const seen = new Set();
        episodeHits = fuseEpisodes.search(query, { limit: 100 })
            .map(r => r.item)
            .filter(ep => {
                if (seen.has(ep.show_id)) return false;
                seen.add(ep.show_id);
                return true;
            });
    }

    // Apply panelist filter
    if (panelist) {
        const pNames = panelistNames(panelist);
        comicHits   = comicHits.filter(m => parsePeople((epMap[m.show_id] || {}).people).some(n => pNames.includes(n)));
        episodeHits = episodeHits.filter(ep => parsePeople(ep.people).some(n => pNames.includes(n)));
    }

    // Apply guest filter
    if (guestOnly) {
        comicHits   = comicHits.filter(m => isGuestEp(epMap[m.show_id] || {}));
        episodeHits = episodeHits.filter(ep => isGuestEp(ep));
    }

    if (!comicHits.length && !episodeHits.length) {
        document.getElementById("sort-row").style.display = "none";
        setResults(noResultsState());
        return;
    }

    document.getElementById("sort-row").style.display = "";

    // Apply sort
    if (sort === "recent") {
        comicHits.sort((a, b) => new Date((epMap[b.show_id] || {}).date || 0) - new Date((epMap[a.show_id] || {}).date || 0));
        episodeHits.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
    }

    let html = panelistFilterHtml();

    if (comicHits.length) {
        html += sectionLabel("Comic Mentions", comicHits.length);
        html += comicHits.map(renderComicCard).join("");
    }

    if (episodeHits.length) {
        html += sectionLabel("Episodes by Topic", episodeHits.length);
        html += episodeHits.map(renderEpisodeCard).join("");
    }

    setResults(html);
}

// ─── Render helpers ───────────────────────────────────────────────────────────
function setResults(html) {
    document.getElementById("results").innerHTML = html;
}

function sectionLabel(label, count) {
    return `<div class="section-label">${label} <span class="result-count">${count} result${count !== 1 ? "s" : ""}</span></div>`;
}


function tsToSeconds(ts) {
    if (!ts) return 0;
    const parts = String(ts).split(":").map(Number);
    if (parts.some(isNaN)) return 0;
    if (parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
    if (parts.length === 2) return parts[0]*60 + parts[1];
    return 0;
}

function secsToSimplecastT(secs) {
    if (!secs) return "";
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    const s = secs % 60;
    return `${String(h).padStart(2,"0")}h${String(m).padStart(2,"0")}m${String(s).padStart(2,"0")}s`;
}

function fmtDate(raw) {
    if (!raw) return "";
    try {
        const d = new Date(raw);
        if (isNaN(d.getTime())) return "";
        return d.toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" });
    } catch { return ""; }
}

function fmtTs(ts) {
    if (!ts || /^0*:?00:00$/.test(String(ts).trim())) return null;
    return String(ts).replace(/^00:/, ""); // trim leading hours if zero
}

const SAFE_HOSTS = new Set([
    "simplecast.com", "ircbpodcast.simplecast.com", "player.simplecast.com",
    "patreon.com", "github.com"
]);

function safeUrl(url) {
    if (typeof url !== "string" || !url) return "#";
    try {
        const u = new URL(url);
        if (u.protocol !== "https:") return "#";
        if (SAFE_HOSTS.has(u.hostname.toLowerCase())) return url;
    } catch { /* invalid URL */ }
    return "#";
}

function esc(s) {
    if (!s) return "";
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function parsePeople(str) {
    if (!str) return [];
    return str.split(",").map(s => s.trim()).filter(Boolean);
}

function panelistNames(name) {
    const p = PANELIST_MAP[name];
    return p && p.aliases ? [name, ...p.aliases] : [name];
}

function isGuestEp(ep) {
    return (ep.title || "").includes("(ft.");
}

function renderComicCard(mention) {
    const ep    = epMap[mention.show_id] || {};
    const ts    = fmtTs(mention.timestamp);
    const date  = fmtDate(ep.date);
    const people  = parsePeople(ep.people).join(", ");
    const isGuest = isGuestEp(ep);

    const slug = ep.player_id || null;
    const secs = tsToSeconds(mention.timestamp);
    const key  = mention.show_id + ":" + (mention.timestamp || "");
    const url  = mention.direct_url || ep.simplecast_url;

    let action = "";
    if (slug && ts) {
        const inner = `<span class="ts-badge">⏱ ${esc(ts)}</span> Jump to mention →`;
        const extLink = url ? `<a class="card-ext-link" href="${esc(safeUrl(url))}" target="_blank" rel="noopener noreferrer">Simplecast ↗</a>` : "";
        action = `<button class="play-btn card-action timestamp" data-key="${esc(key)}" data-orig="${esc(inner)}"
            onclick="toggleEmbed(${esc(JSON.stringify(key))},${esc(JSON.stringify(slug))},${secs})">${inner}</button>${extLink ? " " + extLink : ""}`;
    } else if (url && !slug) {
        if (ts) {
            action = `<a class="card-action timestamp" href="${esc(safeUrl(url))}" target="_blank" rel="noopener noreferrer">
                <span class="ts-badge">⏱ ${esc(ts)}</span> Jump to mention →
            </a>`;
        } else {
            action = `<a class="card-action listen" href="${esc(safeUrl(url))}" target="_blank" rel="noopener noreferrer">
                ▶ Listen to episode →
            </a>`;
        }
    }

    let playBtn = "";
    if (slug && !ts) {
        const extLink = url ? `<a class="card-ext-link" href="${esc(safeUrl(url))}" target="_blank" rel="noopener noreferrer">Simplecast ↗</a>` : "";
        playBtn = `<button class="play-btn card-action listen" data-key="${esc(key)}" data-orig="▶ Play"
            onclick="toggleEmbed(${esc(JSON.stringify(key))},${esc(JSON.stringify(slug))},0)">▶ Play</button>${extLink ? " " + extLink : ""}`;
    }
    if (slug) playBtn += `<div class="embed-wrap" data-key="${esc(key)}"></div>`;

    return `<div class="card">
        <div class="card-top">
            <div>
                <div class="comic-name">${esc(mention.comic)}</div>
                <div class="episode-title">${esc(ep.title || "")}</div>
            </div>
            ${date ? `<span class="card-date">${date}</span>` : ""}
        </div>
        <div class="card-meta">
            ${people ? `<span class="meta-people">with ${esc(people)}</span>` : ""}
            ${mention.segment ? `<span class="pill pill-red">${esc(mention.segment)}</span>` : ""}
            ${isGuest ? `<span class="pill pill-orange">Guest</span>` : ""}
        </div>
        ${action}
        ${playBtn}
    </div>`;
}

function renderEpisodeCard(ep) {
    const date   = fmtDate(ep.date);
    const people  = parsePeople(ep.people).join(", ");
    const isGuest = isGuestEp(ep);
    const kwList = ep.keywords
        ? String(ep.keywords).split(",").map(s => s.trim()).filter(Boolean)
        : [];
    const qLow = query.toLowerCase();

    const kwHtml = kwList.length
        ? `<div class="keywords">${kwList.map(k => {
                const hit = k.toLowerCase().includes(qLow) || qLow.includes(k.toLowerCase());
                return `<span class="kw${hit ? " match" : ""}">${esc(k)}</span>`;
            }).join("")}</div>`
        : "";

    const slug = ep.player_id || null;
    const key  = ep.show_id + ":";
    const extUrl = ep.simplecast_url ? safeUrl(ep.simplecast_url) : null;
    const action = (!slug && extUrl)
        ? `<a class="card-action listen" href="${esc(extUrl)}" target="_blank" rel="noopener noreferrer">▶ Listen →</a>`
        : "";
    const extLink = (slug && extUrl)
        ? `<a class="card-ext-link" href="${esc(extUrl)}" target="_blank" rel="noopener noreferrer">Simplecast ↗</a>`
        : "";
    const playBtn = slug ? `<button class="play-btn card-action listen" data-key="${esc(key)}" data-orig="▶ Play"
        onclick="toggleEmbed(${esc(JSON.stringify(key))},${esc(JSON.stringify(slug))},0)">▶ Play</button>${extLink ? " " + extLink : ""}
        <div class="embed-wrap" data-key="${esc(key)}"></div>` : "";

    return `<div class="card">
        <div class="card-top">
            <div class="episode-title">${esc(ep.title || "")}</div>
            ${date ? `<span class="card-date">${date}</span>` : ""}
        </div>
        <div class="card-meta">
            ${people ? `<span class="meta-people">with ${esc(people)}</span>` : ""}
            ${isGuest ? `<span class="pill pill-orange">Guest</span>` : ""}
        </div>
        ${kwHtml}
        ${action}
        ${playBtn}
    </div>`;
}

// ─── State templates ──────────────────────────────────────────────────────────
function clearSearch() {
    query = "";
    panelist = null;
    guestOnly = false;
    sort = "relevance";
    openEmbed = null;
    document.getElementById("search-input").value = "";
    document.getElementById("clear-btn").style.display = "none";
    document.getElementById("sort-row").style.display = "none";
    document.querySelectorAll(".sort-btn").forEach(b => {
        const active = b.dataset.sort === "relevance";
        b.classList.toggle("active", active);
        b.setAttribute("aria-pressed", String(active));
    });
    history.replaceState(null, "", location.pathname);
    setResults(emptyState());
}

function setSearch(val) {
    query = val;
    document.getElementById("search-input").value = val;
    document.getElementById("clear-btn").style.display = "block";
    const params = new URLSearchParams(location.search);
    params.set("q", val);
    history.replaceState(null, "", "?" + params);
    runSearch();
}

function setPanelist(name) {
    panelist = panelist === name ? null : name;
    const params = new URLSearchParams(location.search);
    panelist ? params.set("panelist", panelist) : params.delete("panelist");
    history.replaceState(null, "", params.toString() ? "?" + params : location.pathname);
    runSearch();
}

function toggleGuestOnly() {
    guestOnly = !guestOnly;
    const params = new URLSearchParams(location.search);
    guestOnly ? params.set("guest", "1") : params.delete("guest");
    history.replaceState(null, "", params.toString() ? "?" + params : location.pathname);
    runSearch();
}

function resetEmbeds() {
    document.querySelectorAll(".embed-wrap").forEach(el => el.innerHTML = "");
    document.querySelectorAll(".play-btn").forEach(b => {
        b.innerHTML = b.getAttribute("data-orig") || "▶ Play";
    });
}

function toggleEmbed(key, slug, startSecs) {
    if (openEmbed === key) {
        openEmbed = null;
        resetEmbeds();
        return;
    }
    resetEmbeds();
    openEmbed = key;
    const wrap = document.querySelector(`.embed-wrap[data-key="${CSS.escape(key)}"]`);
    if (!wrap) return;
    const src = `https://player.simplecast.com/${slug}?dark=true${startSecs ? "&t=" + secsToSimplecastT(startSecs) : ""}`;
    wrap.innerHTML = `<iframe src="${esc(safeUrl(src))}" frameborder="0" scrolling="no"
        title="Episode player"
        allow="autoplay *; encrypted-media *; fullscreen *"
        style="width:100%;height:152px;border-radius:8px;margin-top:0.75rem;display:block;"></iframe>`;
    const btn = document.querySelector(`.play-btn[data-key="${CSS.escape(key)}"]`);
    if (btn) btn.innerHTML = "■ Stop";
}

function panelistFilterHtml() {
    if (!panelists.length) return "";
    const chips = panelists.map(name => {
        const p = PANELIST_MAP[name];
        const label = p ? p.display.split(" ")[0] : name.split(" ")[0];
        return `<button class="panelist-chip${panelist === name ? " active" : ""}"
            onclick="setPanelist(${esc(JSON.stringify(name))})">
            ${esc(label)}
        </button>`;
    }).join("");
    const guestChip = `<button class="panelist-chip guest-chip${guestOnly ? " active" : ""}"
        onclick="toggleGuestOnly()">Guest Episodes</button>`;
    const overflowChip = (panelist && !panelists.includes(panelist))
        ? `<button class="panelist-chip active" onclick="setPanelist(${esc(JSON.stringify(panelist))})">
            ${esc(panelist)} ✕
          </button>`
        : "";
    return `<div class="panelist-row">
        <span class="sort-label">Filter:</span>
        <div class="panelist-chips">${overflowChip}${chips}${guestChip}</div>
    </div>`;
}

function renderPanelistPage(name) {
    // Hide search UI elements
    document.getElementById("search-input").style.display = "none";
    document.getElementById("clear-btn").style.display = "none";
    document.querySelector(".tabs").style.display = "none";

    const panelistEps = episodes
        .filter(ep => parsePeople(ep.people).some(n => panelistNames(name).includes(n)))
        .sort((a, b) => new Date(b.date) - new Date(a.date));

    if (!panelistEps.length) {
        setResults(`<div class="state-box">
            <button class="back-link" onclick="goHome()">← Back to search</button>
            <h2>No episodes found for ${esc(name)}</h2>
        </div>`);
        return;
    }

    // Aggregate top comics for this panelist
    const epIds = new Set(panelistEps.map(ep => ep.show_id));
    const panelistComicCounts = {};
    comics.forEach(m => {
        if (m.comic && epIds.has(m.show_id)) {
            panelistComicCounts[m.comic] = (panelistComicCounts[m.comic] || 0) + 1;
        }
    });
    const topPanelistComics = Object.entries(panelistComicCounts)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 10)
        .map(([comic, count]) => `<button class="trending-chip" onclick="goHome(); setSearch(${esc(JSON.stringify(comic))})">
            <span class="tc-name">${esc(comic)}</span>
            <span class="tc-count">${count} eps</span>
        </button>`).join("");

    const dateRange = `${fmtDate(panelistEps[panelistEps.length - 1].date)} – ${fmtDate(panelistEps[0].date)}`;

    const pInfo = PANELIST_MAP[name];
    const photoHtml = pInfo
        ? `<img class="panelist-photo" src="${esc(pInfo.photo)}" alt="${esc(pInfo.display)}">`
        : "";
    const heroName = pInfo ? pInfo.display : name;

    const html = `
        <button class="back-link" onclick="goHome()">← Back to search</button>
        ${photoHtml}
        <div class="panelist-hero">${esc(heroName)}</div>
        <div class="panelist-stats">${panelistEps.length} episode${panelistEps.length !== 1 ? "s" : ""} · ${dateRange}</div>
        ${topPanelistComics ? `<p class="trending-header">Most Discussed</p>
        <div class="trending-grid" style="margin-bottom:2rem">${topPanelistComics}</div>` : ""}
        <p class="trending-header">Episodes</p>
        ${panelistEps.map(ep => renderEpisodeCard(ep)).join("")}
    `;
    setResults(html);
}

function togglePanelistMenu() {
    const dropdown = document.getElementById("panelist-dropdown");
    const btn = document.getElementById("panelist-nav-btn");
    const isOpen = dropdown.classList.toggle("open");
    btn.setAttribute("aria-expanded", isOpen);
}

function closePanelistMenu() {
    const dropdown = document.getElementById("panelist-dropdown");
    const btn = document.getElementById("panelist-nav-btn");
    dropdown.classList.remove("open");
    btn.setAttribute("aria-expanded", "false");
}

function goHome() {
    panelistView = null;
    document.getElementById("search-input").style.display = "";
    document.getElementById("clear-btn").style.display = "";
    document.querySelector(".tabs").style.display = "";
    clearSearch();
}

function emptyState() {
    if (!topComics.length) {
        return `<div class="state-box">
            <div class="icon">🦸</div>
            <h2>Find Your Comics</h2>
            <p>Type a comic title, publisher, creator, or topic to find every episode that covers it.</p>
        </div>`;
    }
    const renderChips = arr => arr.map(({ name, count }) =>
        `<button class="trending-chip" onclick="setSearch(${esc(JSON.stringify(name))})">
            <span class="tc-name">${esc(name)}</span>
            <span class="tc-count">${count} eps</span>
        </button>`
    ).join("");
    const recentSection = topRecentComics.length
        ? `<p class="trending-header" style="margin-top:1.5rem">Last 12 Months</p>
           <div class="trending-grid">${renderChips(topRecentComics)}</div>`
        : "";
    const newThisWeek = (latestEpisodeInfo && latestEpisodeComics.length)
        ? `<div style="margin-bottom:2rem">
            <p class="trending-header">New This Week</p>
            <p class="new-this-week-ep">${esc(latestEpisodeInfo.title)} — ${fmtDate(latestEpisodeInfo.date)}</p>
            <div class="trending-grid">${latestEpisodeComics.map(name =>
                `<button class="trending-chip" onclick="setSearch(${esc(JSON.stringify(name))})">
                    <span class="tc-name">${esc(name)}</span>
                </button>`
            ).join("")}</div>
          </div>`
        : "";
    return `<div class="empty-state-wrap">
        ${newThisWeek}
        <p class="trending-header">All Time</p>
        <div class="trending-grid">${renderChips(topComics)}</div>
        ${recentSection}
    </div>`;
}

function noResultsState() {
    return `<div>
        ${(panelist || guestOnly) ? panelistFilterHtml() : ""}
        <div class="state-box">
            <div class="icon">🔍</div>
            <h2>No Results</h2>
            <p>Nothing found for "<strong>${esc(query)}</strong>". Try a broader term or check the spelling.</p>
        </div>
    </div>`;
}

function loadingState() {
    return `<div class="state-box loading">
        <div class="icon">⚙️</div>
        <h2>Loading…</h2>
        <p>Fetching episode data.</p>
    </div>`;
}

function errorState(notFound) {
    return notFound
        ? `<div class="state-box error">
            <div class="icon">📂</div>
            <h2>Episode Data Unavailable</h2>
            <p>The episode data couldn't be loaded. Try refreshing the page.</p>
        </div>`
        : `<div class="state-box error">
            <div class="icon">⚠️</div>
            <h2>Something Went Wrong</h2>
            <p>Couldn't load episode data. Try refreshing — if it keeps happening, <a href="https://github.com/mikerapin/ircb-search/issues" target="_blank" rel="noopener noreferrer">let us know</a>.</p>
        </div>`;
}

// ─── Event wiring ─────────────────────────────────────────────────────────────
document.getElementById("search-input").addEventListener("input", function () {
    query = this.value;
    document.getElementById("clear-btn").style.display = query ? "block" : "none";
    clearTimeout(searchDebounceTimer);
    searchDebounceTimer = setTimeout(() => {
        const params = new URLSearchParams(location.search);
        query ? params.set("q", query) : params.delete("q");
        history.replaceState(null, "", params.toString() ? "?" + params : location.pathname);
        runSearch();
    }, 150);
});

document.getElementById("clear-btn").addEventListener("click", clearSearch);
document.querySelector(".logo-row").addEventListener("click", goHome);

document.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", function () {
        document.querySelectorAll(".tab").forEach(b => {
            b.classList.remove("active");
            b.setAttribute("aria-selected", "false");
        });
        this.classList.add("active");
        this.setAttribute("aria-selected", "true");
        mode = this.dataset.mode;
        const params = new URLSearchParams(location.search);
        mode !== "all" ? params.set("mode", mode) : params.delete("mode");
        history.replaceState(null, "", params.toString() ? "?" + params : location.pathname);
        runSearch();
    });
});

document.querySelectorAll(".sort-btn").forEach(btn => {
    btn.addEventListener("click", function () {
        document.querySelectorAll(".sort-btn").forEach(b => {
            b.classList.remove("active");
            b.setAttribute("aria-pressed", "false");
        });
        this.classList.add("active");
        this.setAttribute("aria-pressed", "true");
        sort = this.dataset.sort;
        const params = new URLSearchParams(location.search);
        sort !== "relevance" ? params.set("sort", sort) : params.delete("sort");
        history.replaceState(null, "", params.toString() ? "?" + params : location.pathname);
        runSearch();
    });
});

init();
window.addEventListener('popstate', () => location.reload());
document.addEventListener('click', e => {
    const nav = document.getElementById('panelist-nav');
    if (nav && !nav.contains(e.target)) closePanelistMenu();
});
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closePanelistMenu();
});
</script>
</body>
</html>
